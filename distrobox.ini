# Declarative recreate manifest for the `npu` distrobox.
# Recreate the container from the pinned image with one command:
#
#   distrobox assemble create --file distrobox.ini
#
# Build the image first (see Containerfile / `make image`). `pull=false` keeps
# distrobox from trying to fetch localhost/... from a registry.

[npu]
image=localhost/npu-lemonade:0.9.43
pull=false
start_now=true
# Runtime config (ctx_size) and model pulls run as the *user* after create,
# not here -- init_hooks run as root and would write lemonade config to /root.
# See `make config` / `make models`.
